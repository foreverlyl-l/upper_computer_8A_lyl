services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: access-console-backend:cloud
    restart: unless-stopped
    env_file:
      - .env.cloud
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/access_control.db}
    volumes:
      - backend_data:/data
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;print(urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read().decode())"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  internal:
    driver: bridge

volumes:
  backend_data:
